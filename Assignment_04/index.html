<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Variables Rules</title>
</head>
<body>
    <h1>Rules for naming JS variables</h1><br>
    <p>Variable names can only contain numbers, $ and _. For example: $my_1stVariable </p>
    <p>Variable must begin a letter, $ or _.  For example: $name, _name or name </p>
    <p>Variable names are case sensitive</p>
    <p>Variable names should not be JS keywords</p>
    <script>
        // 3 Variables in 1 statement
        let a = 1, b = 2, c = 3;
        // 5 legal variable names
        let name;
        let _count;
        let $total;
        let my_name = "John";
        let user2 = "Alice";
        // 5 illegal variable names
        // let 2name;
        // let my-name;
        // let var;
        // let full name;
        // let @price;
    </script>
</body>
</html>
